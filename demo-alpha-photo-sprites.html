<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>α: 배경 + 캐릭터 오버레이 · 관상감 데모</title>
<style>
:root {
  --gsg-ink-900: #0B1220;
  --gsg-ink-800: #111827;
  --gsg-ink-700: #1F2937;
  --gsg-paper: #FAF7F0;
  --gsg-gold-500: #C9A24B;
  --gsg-gold-300: #E6C87A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: var(--gsg-ink-900);
  color: var(--gsg-paper);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
.scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(to bottom,
    #1a2742 0%,
    #2c3a5c 25%,
    #5a4d3a 55%,
    #3a2f1f 75%,
    #1a1410 100%);
}
/* Sky stars */
.stars {
  position: absolute;
  top: 0;
  width: 100%;
  height: 35%;
  pointer-events: none;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--gsg-gold-300);
  border-radius: 50%;
  opacity: 0.6;
}
/* Building silhouettes */
.buildings {
  position: absolute;
  bottom: 35%;
  width: 100%;
  height: 45%;
  pointer-events: none;
}
.building {
  position: absolute;
  bottom: 0;
  background: linear-gradient(to bottom, #0a0f1c, #050810);
  border-top-left-radius: 2px;
  border-top-right-radius: 2px;
}
.window {
  position: absolute;
  width: 6px;
  height: 9px;
  background: var(--gsg-gold-300);
  box-shadow: 0 0 6px var(--gsg-gold-500);
  opacity: 0.7;
}
/* Street/sidewalk */
.street {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 35%;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%),
    repeating-linear-gradient(
      to right,
      #1a1410 0px,
      #1a1410 80px,
      #2a1f15 80px,
      #2a1f15 82px
    );
}
.crosswalk {
  position: absolute;
  bottom: 8%;
  left: 20%;
  right: 20%;
  height: 12px;
  background: repeating-linear-gradient(
    to right,
    rgba(255,255,255,0.25) 0px,
    rgba(255,255,255,0.25) 20px,
    transparent 20px,
    transparent 35px
  );
}
.moon {
  position: absolute;
  top: 8%;
  right: 12%;
  width: 60px;
  height: 60px;
  background: radial-gradient(circle, var(--gsg-gold-300), transparent 70%);
  border-radius: 50%;
}

/* Character sprites */
.persona {
  position: absolute;
  width: 28px;
  height: 42px;
  cursor: pointer;
  transition: transform 0.15s, filter 0.15s;
  z-index: 10;
}
.persona:hover {
  transform: scale(1.6);
  filter: drop-shadow(0 0 10px var(--gsg-gold-500));
  z-index: 100;
}
.persona svg { width: 100%; height: 100%; }
.persona-bob {
  animation: bob 0.6s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

/* HUD */
.hud-top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 24px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(11,18,32,0.9), transparent);
  z-index: 1000;
}
.brand {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  color: var(--gsg-gold-500);
  letter-spacing: 0.08em;
}
.brand small {
  font-family: inherit;
  font-size: 10px;
  color: var(--gsg-paper);
  opacity: 0.5;
  display: block;
  letter-spacing: 0.25em;
  margin-top: 2px;
}
.location-tag {
  font-family: 'SF Mono', 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--gsg-paper);
  opacity: 0.7;
  border-left: 2px solid var(--gsg-gold-500);
  padding-left: 12px;
  text-align: right;
}
.location-tag span { display: block; }
.location-tag .demo-tag {
  color: var(--gsg-gold-500);
  font-weight: 600;
}
.hud-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 24px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to top, rgba(11,18,32,0.95), transparent);
  z-index: 1000;
  pointer-events: none;
}
.counter {
  font-family: 'SF Mono', 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--gsg-paper);
  letter-spacing: 0.1em;
}
.counter strong {
  color: var(--gsg-gold-500);
  font-size: 26px;
  font-family: 'Noto Serif KR', serif;
  letter-spacing: 0.02em;
  margin-right: 12px;
}
.hint {
  font-size: 11px;
  color: var(--gsg-paper);
  opacity: 0.5;
  letter-spacing: 0.15em;
}

/* Persona panel */
.panel {
  position: fixed;
  top: 0;
  right: -440px;
  width: 440px;
  height: 100vh;
  background: var(--gsg-ink-800);
  border-left: 1px solid var(--gsg-gold-500);
  padding: 80px 36px 36px;
  overflow-y: auto;
  transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2000;
  box-shadow: -8px 0 24px rgba(0,0,0,0.4);
}
.panel.open { right: 0; }
.panel-close {
  position: absolute;
  top: 24px;
  right: 24px;
  background: transparent;
  border: 1px solid var(--gsg-ink-700);
  color: var(--gsg-paper);
  padding: 6px 14px;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.15em;
  font-family: 'SF Mono', monospace;
}
.panel-close:hover {
  border-color: var(--gsg-gold-500);
  color: var(--gsg-gold-500);
}
.panel-id {
  font-family: 'SF Mono', monospace;
  font-size: 10px;
  color: var(--gsg-gold-500);
  letter-spacing: 0.2em;
  margin-bottom: 8px;
}
.panel-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 36px;
  color: var(--gsg-paper);
  margin-bottom: 12px;
}
.panel-meta {
  font-family: 'SF Mono', monospace;
  font-size: 12px;
  color: var(--gsg-paper);
  opacity: 0.65;
  margin-bottom: 28px;
  line-height: 1.6;
  letter-spacing: 0.05em;
}
.panel-section-label {
  font-family: 'SF Mono', monospace;
  font-size: 10px;
  color: var(--gsg-gold-500);
  letter-spacing: 0.25em;
  margin-top: 28px;
  margin-bottom: 12px;
}
.panel-narrative {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  line-height: 1.8;
  color: var(--gsg-paper);
  opacity: 0.92;
}
.chat-box {
  margin-top: 16px;
  padding: 16px 18px;
  background: var(--gsg-ink-900);
  border: 1px solid var(--gsg-ink-700);
}
.chat-input {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--gsg-paper);
  font-family: inherit;
  font-size: 14px;
  outline: none;
}
.chat-input::placeholder { color: var(--gsg-paper); opacity: 0.4; }
.chat-hint {
  font-size: 11px;
  color: var(--gsg-paper);
  opacity: 0.4;
  margin-top: 10px;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="hud-top">
  <div class="brand">관상감 觀象監<small>ROYAL OBSERVATORY FOR TOMORROW</small></div>
  <div class="location-tag">
    <span class="demo-tag">DEMO α · PHOTO + SPRITES</span>
    <span>강남역 11번 출구 · 오전 8:15</span>
  </div>
</div>

<div class="scene" id="scene">

  <div class="stars" id="stars"></div>
  <div class="buildings" id="buildings"></div>
  <div class="street">
    <div class="crosswalk"></div>
  </div>
</div>

<div class="hud-bottom">
  <div class="counter"><strong id="counter">0</strong>SYNTHETIC KOREANS LIVING TODAY</div>
  <div class="hint">아무 사람이나 클릭하세요 · CLICK ANY PERSON</div>
</div>

<aside class="panel" id="panel">
  <button class="panel-close" onclick="closePanel()">CLOSE ✕</button>
  <div class="panel-id" id="panel-id">PERSONA #GOLD-000001</div>

  </div>
</aside>

<script>

  {id:'GOLD-013492', name:'김민지', age:32, gender:'여', addr:'서울 강남구 역삼동', job:'스타트업 마케팅 대리', narrative:'5년차 마케터. ESTJ. 주말마다 한강에서 러닝 10km. 결혼은 30대 후반으로 미루는 중. 부모님은 안동에서 사과 농사. 매달 용돈 보냄. 회사 근처 원룸에 자취 3년. 요즘 가장 큰 고민은 부동산.'},
  {id:'GOLD-007821', name:'박준호', age:45, gender:'남', addr:'서울 마포구 합정동', job:'카페 사장 (10년)', narrative:'합정역 근처 작은 로스터리 카페 운영. 코로나로 2번 폐업 위기를 넘김. 둘째 딸 중학교 입학. 아내는 영어학원 강사. 새벽 4시 출근. 원두 직접 로스팅하는 게 자부심.'},
  {id:'GOLD-091203', name:'이수영', age:28, gender:'여', addr:'부산 해운대구 우동', job:'공학 박사과정 3년차', narrative:'KAIST 학사 → 부산대 박사. 논문 3편 발표. 마감 임박. 남자친구는 서울. 장거리 연애 2년. 광안리 카페 단골. 운동은 안 하지만 마음은 늘 한강 뛰는 중.'},
  {id:'GOLD-002104', name:'정태규', age:67, gender:'남', addr:'광주 동구 충장동', job:'은퇴 (전 시청 공무원)', narrative:'30년 시청 도시계획과 근무. 작년 명예퇴직. 새벽 등산 모임 회장. 손주 둘. 5·18 묘지 자주 참배. 요즘 손주들에게 한자 가르치는 게 낙.'},
  {id:'GOLD-058431', name:'최유진', age:24, gender:'여', addr:'서울 관악구 신림동', job:'대학생 (국문, 휴학)', narrative:'1년 휴학 중. 카페 알바 + 그림. 첫 개인전 11월 예정. 부모 이혼 후 엄마와 살았음. 시집 출간이 꿈. 신림동 고시촌의 카페에서 매일 8시간.'},

  {id:'GOLD-041552', name:'한미경', age:55, gender:'여', addr:'대전 유성구 어은동', job:'주부 (전 간호사)', narrative:'간호사 20년 후 퇴직. 고2 딸 의대 입시 매니징. 매일 새벽 도서관 동행. 남편은 충남대 교수. 자기 인생인지 딸 인생인지 가끔 헷갈림.'},

  {id:'GOLD-029184', name:'유찬영', age:31, gender:'남', addr:'성남시 분당구 정자동', job:'네이버 백엔드 개발자', narrative:'카이스트 컴공 → 카카오 → 네이버. 4년차. 코딩 실력 인정. 연봉 1억 초반. 결혼 1년 차. 회사 만족도 높음.'},

// Generate sky stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = (Math.random() * 100) + '%';
  s.style.top = (Math.random() * 100) + '%';
  s.style.opacity = 0.3 + Math.random() * 0.7;
  s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
  starsContainer.appendChild(s);
}

// Generate buildings
const buildingsContainer = document.getElementById('buildings');
let xPos = 0;
while (xPos < 100) {
  const b = document.createElement('div');
  b.className = 'building';
  const w = 8 + Math.random() * 8;
  const h = 30 + Math.random() * 60;
  b.style.left = xPos + '%';
  b.style.width = w + '%';
  b.style.height = h + '%';
  buildingsContainer.appendChild(b);

  // Add windows
  const cols = Math.floor(w * 3);
  const rows = Math.floor(h / 8);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.4) {
        const win = document.createElement('div');
        win.className = 'window';
        win.style.left = ((c + 0.3) / cols * 100) + '%';
        win.style.top = ((r + 0.2) / rows * 100) + '%';
        win.style.opacity = 0.2 + Math.random() * 0.7;
        b.appendChild(win);
      }
    }
  }
  xPos += w + 0.3;
}

// SVG character generator
function makeCharacterSVG(p) {
  const palette = ['#C9A24B', '#E6C87A', '#3B82F6', '#0891B2', '#DC2626', '#059669', '#7C3AED', '#DB2777', '#F59E0B', '#10B981'];
  const skin = ['#F5D9A8', '#EBC591', '#D4A574', '#C29D6B'];
  const c = palette[p.name.charCodeAt(0) % palette.length];
  const sk = skin[p.age % skin.length];
  const isF = p.gender === '여';
  return `
    <svg viewBox="0 0 28 42" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="14" cy="38" rx="9" ry="2" fill="rgba(0,0,0,0.4)"/>
      <circle cx="14" cy="8" r="5" fill="${sk}"/>
      <path d="M 9 8 Q 14 ${isF ? '1' : '3'} 19 8 L ${isF ? '20' : '19'} ${isF ? '14' : '11'} L ${isF ? '8' : '9'} ${isF ? '14' : '11'} Z" fill="#1A0F0A"/>
      <rect x="${isF ? 7 : 8}" y="13" width="${isF ? 14 : 12}" height="${isF ? 17 : 15}" fill="${c}" rx="2"/>
      ${isF ? `<path d="M 7 13 L 21 13 L 22 28 L 6 28 Z" fill="${c}" opacity="0.85"/>` : ''}
      <rect x="${isF ? 10 : 9}" y="${isF ? 28 : 27}" width="2.5" height="${isF ? 11 : 12}" fill="#2A2018"/>
      <rect x="${isF ? 15.5 : 16.5}" y="${isF ? 28 : 27}" width="2.5" height="${isF ? 11 : 12}" fill="#2A2018"/>
      <circle cx="11.5" cy="8" r="0.6" fill="#1A0F0A"/>
      <circle cx="16.5" cy="8" r="0.6" fill="#1A0F0A"/>
    </svg>
  `;
}

// Place personas
const scene = document.getElementById('scene');
const styleEl = document.createElement('style');
document.head.appendChild(styleEl);
let keyframesAll = '';

PERSONAS.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'persona persona-bob';
  el.innerHTML = makeCharacterSVG(p);

  const startX = 5 + Math.random() * 85;
  const groundY = 68 + Math.random() * 25;
  const duration = 18 + Math.random() * 25;
  const delay = -Math.random() * 30;

  el.style.left = startX + '%';
  el.style.top = groundY + '%';

  const dir = Math.random() > 0.5 ? 1 : -1;
  const dist = 20 + Math.random() * 40;
  keyframesAll += `
    @keyframes walk-${i} {
      0%, 100% { transform: translateX(0) scaleX(${dir}); }
      50% { transform: translateX(${dir * dist}vw) scaleX(${dir}); }
    }
  `;
  el.style.animation = `walk-${i} ${duration}s ease-in-out ${delay}s infinite, bob 0.7s ease-in-out infinite`;

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openPanel(p);
  });

  scene.appendChild(el);
});
styleEl.textContent = keyframesAll;

function openPanel(p) {
  document.getElementById('panel-id').textContent = 'PERSONA #' + p.id;
  document.getElementById('panel-name').textContent = p.name;
  document.getElementById('panel-meta').textContent =
    `${p.age}세 · ${p.gender} · ${p.addr}\n${p.job}`;
  document.getElementById('panel-narrative').textContent = p.narrative;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// Animated counter
let displayedCount = 0;
const target = 1784048;
const counterEl = document.getElementById('counter');
const interval = setInterval(() => {
  displayedCount += Math.ceil((target - displayedCount) / 20);
  counterEl.textContent = displayedCount.toLocaleString();
  if (displayedCount >= target) {
    counterEl.textContent = target.toLocaleString();
    clearInterval(interval);
  }
}, 30);
</script>
